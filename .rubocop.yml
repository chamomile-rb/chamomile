AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# We use double quotes consistently throughout
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# EscapeParser (265 LOC) and Program (380 LOC) are complex by nature
Metrics/ClassLength:
  Max: 400

# Commands module is large due to many command helpers
Metrics/ModuleLength:
  Max: 160

# event_loop, setup_terminal, dispatch_csi handle many cases
Metrics/MethodLength:
  Max: 120

Metrics/AbcSize:
  Max: 80

Metrics/CyclomaticComplexity:
  Max: 40

Metrics/PerceivedComplexity:
  Max: 40

# Options constructor has many keyword args
Metrics/ParameterLists:
  Max: 15

# Short names like w, h, e are clear in context (resize, rescue, etc.)
Naming/MethodParameterName:
  AllowedNames:
    - n
    - p
    - v
    - c
    - k
    - e
    - w
    - h
    - i
    - x
    - "y"
    - ch

# We prefer annotated format strings but won't enforce everywhere
Style/FormatStringToken:
  Enabled: false

# Examples and tests are informal — relax documentation requirement
Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'
    - 'tests/**/*'

# We use -> for all lambdas (single and multiline) for consistency
Style/Lambda:
  EnforcedStyle: literal

# Trailing commas in multiline — keeps diffs clean
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Dev deps in gemspec is fine for a single-gemspec project
Gemspec/DevelopmentDependencies:
  Enabled: false
