AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# We use double quotes consistently throughout
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# EscapeParser (265 LOC), Program (380 LOC), Style (460 LOC) are complex by nature
Metrics/ClassLength:
  Max: 460

# Commands module is large due to many command helpers
Metrics/ModuleLength:
  Max: 160

# event_loop, setup_terminal, dispatch_csi handle many cases
Metrics/MethodLength:
  Max: 120

Metrics/AbcSize:
  Max: 80

Metrics/CyclomaticComplexity:
  Max: 40

Metrics/PerceivedComplexity:
  Max: 40

# Options constructor has many keyword args
Metrics/ParameterLists:
  Max: 15

# Short names like w, h, e are clear in context (resize, rescue, etc.)
Naming/MethodParameterName:
  AllowedNames:
    - n
    - p
    - v
    - c
    - k
    - e
    - w
    - h
    - i
    - x
    - "y"
    - ch
    - s
    - t
    - r
    - g
    - b
    - r1
    - g1
    - b1
    - r2
    - g2
    - b2
    - cp
    - bs

# We prefer annotated format strings but won't enforce everywhere
Style/FormatStringToken:
  Enabled: false

# Examples, tests, and styling modules are informal — relax documentation requirement
Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'
    - 'tests/**/*'
    - 'lib/chamomile/styling/**/*'

# Style methods use boolean defaults for fluent API (e.g. .bold, .bold(true), .bold(false))
Style/OptionalBooleanParameter:
  Exclude:
    - 'lib/chamomile/styling/style.rb'

# Large lookup table is appropriate for color mapping
Metrics/CollectionLiteralLength:
  Exclude:
    - 'lib/chamomile/styling/color_profile.rb'

# truecolor_to_256 method name matches the color domain
Naming/VariableNumber:
  Exclude:
    - 'lib/chamomile/styling/color_profile.rb'

# did_select_file? and did_select_disabled_file? return tuple, match BubbleTea API
Naming/PredicateMethod:
  Exclude:
    - 'lib/chamomile/components/file_picker.rb'

# set_filter_text, set_percent, set_content are public API methods
Naming/AccessorMethodName:
  Exclude:
    - 'lib/chamomile/components/list.rb'
    - 'lib/chamomile/components/progress.rb'
    - 'lib/chamomile/components/viewport.rb'

# Table normalize_columns has an expected pass-through branch
Lint/DuplicateBranch:
  Exclude:
    - 'lib/chamomile/components/table.rb'

# We use -> for all lambdas (single and multiline) for consistency
Style/Lambda:
  EnforcedStyle: literal

# Trailing commas in multiline — keeps diffs clean
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Dev deps in gemspec is fine for a single-gemspec project
Gemspec/DevelopmentDependencies:
  Enabled: false
